<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drift - Anti-Navigation POC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Crimson+Pro:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Field Experiment / POC</p>
          <h1>Drift</h1>
        </div>
        <button id="new-prompt-btn" class="ghost-btn">Draw New Cue</button>
      </header>

      <section class="card compass-card">
        <p class="label">The Vague Compass</p>
        <div class="compass-face">
          <p id="direction-text" class="direction">Start drifting</p>
          <p id="distance-text" class="distance">No rigid route. Just a pull.</p>
        </div>
      </section>

      <section class="card prompt-card">
        <p class="label">Situational Prompt</p>
        <p id="prompt-text" class="prompt-text">Tap "Draw New Cue" to begin.</p>
      </section>

      <section class="card controls-card">
        <label class="switch-row" for="safety-toggle">
          <span>
            <strong>Invisible Leash</strong>
            <small>Bias prompts toward safer, populated places</small>
          </span>
          <input id="safety-toggle" type="checkbox" checked />
        </label>

        <label class="switch-row" for="serendipity-toggle">
          <span>
            <strong>Serendipity Pings</strong>
            <small>Vibrate when near hidden gems (if supported)</small>
          </span>
          <input id="serendipity-toggle" type="checkbox" checked />
        </label>

        <div class="button-row">
          <button id="start-btn" class="primary-btn">Start Walk</button>
          <button id="home-btn" class="ghost-btn">Return Home</button>
        </div>
      </section>

      <section class="card log-card">
        <p class="label">Drift Feed</p>
        <ul id="feed"></ul>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
